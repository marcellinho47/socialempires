<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8"/>
		<title>Social Empires — Novo Empire</title>
		<link rel="shortcut icon" href="img/icon.gif"/>
		<link rel="icon" type="image/png" href="img/icon.gif"/>
		<link rel="stylesheet" href="css/facebook.css"/>
	</head>
	<body class="ego_wide canvas center_fixed_width_app fbx UIPage_LoggedOut liquid hideBanner Locale_en_US" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: auto;">
		<center><img src="img/logo.png" style="width: 200px;"/></center>
		<div class="mvl ptm uiInterstitial canvas_error_page uiInterstitialLarge uiBoxWhite">
			<div class="uiHeader uiHeaderBottomBorder mhl mts uiHeaderPage interstitialHeader">
				<div class="clearfix uiHeaderTop">
					<div>
						<img src="img/sword.png" height="18px" style="margin-left: 5px;">
						<h2 class="uiHeaderTitle" style="margin-left: 2px; display: inline-block;">
							<a href="/" style="text-decoration: none;">Social Empires </a>
						</h2>
						<p style="display: inline-block; margin: 0 0 4px 6px;">Novo Empire ~ {{ version | default("?")}}</p>
					</div>
				</div>
			</div>
			<div class="phl ptm uiInterstitialContent" style="overflow: auto;">
				<br>
				<div style="margin-left:20px; font-size:13px;">
					{% if error %}
					<div style="color: #b00; background: #fee; border: 1px solid #faa; padding: 6px 10px; margin-bottom: 14px; border-radius: 4px;">
						{{ error }}
					</div>
					{% endif %}
					<form method="post" style="max-width: 360px;">
						<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
						<b>Email</b>
						<br><br>
						<input type="email" name="email" required autofocus
						       value="{{ email | default('') }}"
						       style="height: 24px; width: 330px; padding: 2px 6px;"
						       placeholder="seu@email.com">
						<br><br>
						<b>Senha</b>
						<br><br>
						<input type="password" name="password" required autocomplete="new-password"
						       minlength="4"
						       style="height: 24px; width: 330px; padding: 2px 6px;"
						       placeholder="mínimo 4 caracteres">
						<br><br>
						<button type="submit" style="font-size:14px; height: 28px; padding: 0 16px;">Criar empire</button>
						&nbsp; <a href="/" style="font-size: 13px;">cancelar</a>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
