services:
  server:
    build: .
    environment:
      SE_HOST: "0.0.0.0"
      SE_PORT: "5050"
      SE_PUBLIC_HOST: "${SE_PUBLIC_HOST:-127.0.0.1}"
      SE_SECRET_KEY: "${SE_SECRET_KEY:-troque-por-uma-chave-secreta-aleatoria}"
    volumes:
      - ./saves:/app/saves
      - ./download_assets:/app/download_assets

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - server
